name: greengridhill
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Firebase Integration
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.1
  
  # MQTT Communication
  mqtt_client: ^10.4.0
  
  # Data Visualization
  syncfusion_flutter_charts: ^27.1.58
  syncfusion_flutter_gauges: ^27.1.58
  
  # Local Storage
  shared_preferences: ^2.3.3
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # HTTP Communication
  http: ^1.2.2
  
  # Utilities
  intl: ^0.19.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
